<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Migonest | Study Abroad Made Simple - University Experts & Admissions</title>
  <meta name="description"
    content="Migonest connects international students with university experts for personalized guidance on admissions, visas, and university selection. Study abroad with confidence." />
  <meta name="keywords"
    content="study abroad, international students, university admissions, visa guidance, university experts, education consultants, global education, student portal" />
  <meta name="author" content="Migonest" />
  <link rel="canonical" href="https://migonest.com" />

  <!-- Open Graph / Social Sharing Meta Tags -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Migonest - Study Abroad Made Simple" />
  <meta property="og:description"
    content="Connect with University Experts for personalized guidance on admissions and visas. Your journey to international education starts here." />
  <meta property="og:image" content="https://migonest.com/assets/Migonest-Primary-Logo-Square.png" />
  <meta property="og:url" content="https://migonest.com" />
  <meta property="og:site_name" content="Migonest" />

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Migonest - Study Abroad Made Simple" />
  <meta name="twitter:description"
    content="Connect with University Experts for personalized guidance on admissions and visas." />
  <meta name="twitter:image" content="https://migonest.com/assets/Migonest-Primary-Logo-Square.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Migonest",
    "url": "https://migonest.com",
    "description": "Connecting international students with University Experts for admissions and visa guidance.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://migonest.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>

        env: { NODE_ENV: 'production' },

      window.process = window.process || mockProcess;
      if (!window.process.env) window.process.env = {};
    })();
  </script>
